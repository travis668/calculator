<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#171717">
    <meta name="description" content="可離線使用的 PWA 計算機">
    <title>離線計算機</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/icon.svg">
    <link rel="stylesheet" href="./src/styles.css">
    <script type="module" src="./src/app.js"></script>
  </head>
  <body>
    <main class="app-shell" aria-label="PWA 計算機">
      <section class="calculator" aria-label="計算機">
        <header class="topbar">
          <p class="app-title">離線計算機</p>
          <p class="status" data-status>正在準備離線快取</p>
        </header>

        <output class="display" data-display aria-live="polite">0</output>

        <div class="keypad" aria-label="計算機按鍵">
          <button class="key key-muted" type="button" data-key="C">C</button>
          <button class="key key-muted" type="button" data-key="+/-">+/-</button>
          <button class="key key-muted" type="button" data-key="%">%</button>
          <button class="key key-operator" type="button" data-key="÷">÷</button>

          <button class="key" type="button" data-key="7">7</button>
          <button class="key" type="button" data-key="8">8</button>
          <button class="key" type="button" data-key="9">9</button>
          <button class="key key-operator" type="button" data-key="×">×</button>

          <button class="key" type="button" data-key="4">4</button>
          <button class="key" type="button" data-key="5">5</button>
          <button class="key" type="button" data-key="6">6</button>
          <button class="key key-operator" type="button" data-key="-">-</button>

          <button class="key" type="button" data-key="1">1</button>
          <button class="key" type="button" data-key="2">2</button>
          <button class="key" type="button" data-key="3">3</button>
          <button class="key key-operator" type="button" data-key="+">+</button>

          <button class="key" type="button" data-key="⌫">⌫</button>
          <button class="key" type="button" data-key="0">0</button>
          <button class="key" type="button" data-key=".">.</button>
          <button class="key key-equals" type="button" data-key="=">=</button>
        </div>
      </section>
    </main>
  </body>
</html>
