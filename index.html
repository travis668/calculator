<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#171717">
    <meta name="description" content="可離線使用的 PWA 計算機">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="計算機">
    <title>離線計算機</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <link rel="apple-touch-startup-image" href="./icons/startup.png">
    <link rel="stylesheet" href="./src/styles.css">
    <script type="module" src="./src/app.js"></script>
  </head>
  <body>
    <main class="app-shell" aria-label="PWA 計算機">
      <section class="calculator" aria-label="計算機">
        <header class="topbar">
          <p class="app-title">離線計算機</p>
          <div class="topbar-right">
            <p class="status" data-status>可離線使用</p>
            <button class="history-toggle" type="button" data-history-toggle aria-expanded="false" aria-controls="history-sidebar">歷史</button>
          </div>
        </header>

        <div class="display-panel" aria-live="polite">
          <output class="expression" data-expression aria-label="算式"></output>
          <output class="display" data-display aria-label="結果">0</output>
        </div>

        <div class="keypad" aria-label="計算機按鍵">
          <button class="key key-muted" type="button" data-key="C">C</button>
          <button class="key key-muted" type="button" data-key="(">(</button>
          <button class="key key-muted" type="button" data-key=")">)</button>
          <button class="key key-muted" type="button" data-key="⌫">⌫</button>

          <button class="key key-muted" type="button" data-key="+/-">+/-</button>
          <button class="key key-muted" type="button" data-key="%">%</button>
          <button class="key key-operator" type="button" data-key="÷">÷</button>
          <button class="key key-operator" type="button" data-key="×">×</button>

          <button class="key" type="button" data-key="7">7</button>
          <button class="key" type="button" data-key="8">8</button>
          <button class="key" type="button" data-key="9">9</button>
          <button class="key key-operator" type="button" data-key="-">-</button>

          <button class="key" type="button" data-key="4">4</button>
          <button class="key" type="button" data-key="5">5</button>
          <button class="key" type="button" data-key="6">6</button>
          <button class="key key-operator" type="button" data-key="+">+</button>

          <button class="key" type="button" data-key="1">1</button>
          <button class="key" type="button" data-key="2">2</button>
          <button class="key" type="button" data-key="3">3</button>
          <button class="key key-equals" type="button" data-key="=">=</button>

          <button class="key key-zero" type="button" data-key="0">0</button>
          <button class="key" type="button" data-key=".">.</button>
        </div>

      </section>

      <button class="history-backdrop" type="button" data-history-backdrop aria-label="關閉歷史記錄"></button>

      <aside class="history-sidebar" id="history-sidebar" aria-label="歷史記錄" aria-hidden="true">
        <div class="history-banner" aria-hidden="true">
          <span class="history-banner-icon">🕘</span>
          <div class="history-banner-text">
            <p class="history-banner-title">歷史記錄</p>
            <p class="history-banner-subtitle">點算式可載入，點結果可帶回計算</p>
          </div>
        </div>
        <div class="history-header">
          <button class="history-clear history-clear-inline" type="button" data-history-clear>🗑 清除</button>
          <button class="history-close" type="button" data-history-close>返回</button>
        </div>
        <p class="history-hint" data-history-status></p>
        <ul class="history-list" data-history-list></ul>
      </aside>
    </main>
  </body>
</html>
